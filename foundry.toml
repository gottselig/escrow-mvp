[profile.default]
src = "contracts/src"
out = "contracts/out"
libs = ["contracts/lib"]
test = "contracts/test"
cache_path = "contracts/cache"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.dev]
eth_rpc_url = "${LOCAL_RPC_URL}"

[profile.prod]
eth_rpc_url = "${SEPOLIA_RPC_URL}"

[rpc_endpoints]
local = "${LOCAL_RPC_URL}"
mainnet = "${RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
